function base64ToArrayBuffer(base64) {
  const binary = atob(base64);
  const len = binary.length;
  const bytes = new Uint8Array(len);
  for (let i = 0; i < len; i++) bytes[i] = binary.charCodeAt(i);
  return bytes.buffer;
}

function computeBodyBounds(model) {
  let yMin = 1 / 0, yMax = -1 / 0;
  const points = [];
  model.traverse(child => {
    if (!child.isMesh) return;
    const pos = child.geometry.attributes.position;
    for (let i = 0; i < pos.count; i++) {
      const x = pos.getX(i), y = pos.getY(i), z = pos.getZ(i);
      points.push(x, y, z);
      if (y < yMin) yMin = y;
      if (y > yMax) yMax = y;
    }
  });
  const bins = 60;
  const stats = Array.from({
    length: bins
  }, () => ({
    count: 0,
    xMin: 1 / 0,
    xMax: -1 / 0,
    zMin: 1 / 0,
    zMax: -1 / 0
  }));
  for (let i = 0; i < points.length; i += 3) {
    const x = points[i], y = points[i + 1], z = points[i + 2];
    let bi = Math.floor((y - yMin) / (yMax - yMin) * bins);
    bi = Math.max(0, Math.min(bins - 1, bi));
    const s = stats[bi];
    s.count++;
    if (x < s.xMin) s.xMin = x;
    if (x > s.xMax) s.xMax = x;
    if (z < s.zMin) s.zMin = z;
    if (z > s.zMax) s.zMax = z;
  }
  const lowerCount = Math.floor(bins * .7);
  let maxDepth = 0;
  for (let i = 0; i < lowerCount; i++) {
    const s = stats[i];
    if (s.count === 0) continue;
    maxDepth = Math.max(maxDepth, s.zMax - s.zMin);
  }
  let bodyTopBin = bins - 1;
  for (let i = 0; i < bins; i++) {
    const s = stats[i];
    if (s.count === 0) continue;
    if (s.zMax - s.zMin < maxDepth * .82) {
      bodyTopBin = i;
      break;
    }
  }
  const bodyTopY = yMin + bodyTopBin / bins * (yMax - yMin);
  let sumHalfW = 0, sumHalfD = 0, n = 0;
  for (let i = 0; i < bodyTopBin; i++) {
    const s = stats[i];
    if (s.count === 0) continue;
    sumHalfW += (s.xMax - s.xMin) / 2;
    sumHalfD += (s.zMax - s.zMin) / 2;
    n++;
  }
  return {
    yMin: yMin,
    yMax: yMax,
    bodyTopY: bodyTopY,
    halfWidth: n ? sumHalfW / n : .5,
    halfDepth: n ? sumHalfD / n : .5
  };
}

function paintGradient(model, body) {
  const blue = new THREE.Color(BLUE);
  const white = new THREE.Color(WHITE);
  const tmp = new THREE.Color;
  const gradStart = body.bodyTopY;
  const gradEnd = body.yMax;
  const meshes = [];
  model.traverse(child => {
    if (!child.isMesh) return;
    const geo = child.geometry;
    const pos = geo.attributes.position;
    const index = geo.index ? geo.index.array : null;
    const archVertexIndices = new Set;
    if (index) for (let t = 0; t < index.length / 3; t++) {
      if (!ARCH_WALL_TRIS.has(t)) continue;
      archVertexIndices.add(index[t * 3]);
      archVertexIndices.add(index[t * 3 + 1]);
      archVertexIndices.add(index[t * 3 + 2]);
    }
    const colors = new Float32Array(pos.count * 3);
    for (let i = 0; i < pos.count; i++) {
      let t;
      if (archVertexIndices.has(i)) t = 0; else {
        t = (pos.getY(i) - gradStart) / (gradEnd - gradStart);
        t = Math.max(0, Math.min(1, t));
        t = t * t * (3 - 2 * t);
      }
      tmp.copy(blue).lerp(white, t);
      colors[i * 3] = tmp.r;
      colors[i * 3 + 1] = tmp.g;
      colors[i * 3 + 2] = tmp.b;
    }
    geo.setAttribute("color", new THREE.BufferAttribute(colors, 3));
    meshes.push(child);
  });
  return meshes;
}

function buildStyledMesh(rawGeo, showEdges = true) {
  const geo = mergeVertices(rawGeo, 1e-4);
  geo.computeVertexNormals();
  const material = new THREE.MeshStandardMaterial({
    vertexColors: true,
    roughness: .45,
    metalness: .12,
    envMapIntensity: 1.1,
    side: THREE.DoubleSide
  });
  const mesh = new THREE.Mesh(geo, material);
  mesh.castShadow = false;
  mesh.receiveShadow = false;
  if (showEdges) {
    const edgesGeo = new THREE.EdgesGeometry(geo, 20);
    const edgesMat = new THREE.LineBasicMaterial({
      color: WHITE,
      transparent: true,
      opacity: .85
    });
    mesh.add(new THREE.LineSegments(edgesGeo, edgesMat));
  }
  return mesh;
}

function clipTrianglesByPlane(tris, nx, ny, d) {
  const pos = [], neg = [];
  function side(v) {
    return nx * v.p[0] + ny * v.p[1] - d;
  }
  function lerpVert(a, b, t) {
    return {
      p: [ a.p[0] + (b.p[0] - a.p[0]) * t, a.p[1] + (b.p[1] - a.p[1]) * t, a.p[2] + (b.p[2] - a.p[2]) * t ],
      c: [ a.c[0] + (b.c[0] - a.c[0]) * t, a.c[1] + (b.c[1] - a.c[1]) * t, a.c[2] + (b.c[2] - a.c[2]) * t ]
    };
  }
  tris.forEach(([v0, v1, v2]) => {
    const s0 = side(v0), s1 = side(v1), s2 = side(v2);
    const above = [ s0 >= 0, s1 >= 0, s2 >= 0 ];
    const cnt = above.filter(Boolean).length;
    if (cnt === 3) {
      pos.push([ v0, v1, v2 ]);
      return;
    }
    if (cnt === 0) {
      neg.push([ v0, v1, v2 ]);
      return;
    }
    const verts3 = [ v0, v1, v2 ];
    const sides = [ s0, s1, s2 ];
    const loneAbove = cnt === 1;
    const loneIdx = above.indexOf(loneAbove);
    const otherIdx = [ 0, 1, 2 ].filter(i => i !== loneIdx);
    const L = verts3[loneIdx], O1 = verts3[otherIdx[0]], O2 = verts3[otherIdx[1]];
    const sL = sides[loneIdx], sO1 = sides[otherIdx[0]], sO2 = sides[otherIdx[1]];
    const t1 = sL / (sL - sO1);
    const t2 = sL / (sL - sO2);
    const P1 = lerpVert(L, O1, t1);
    const P2 = lerpVert(L, O2, t2);
    const loneArr = loneAbove ? pos : neg;
    const otherArr = loneAbove ? neg : pos;
    loneArr.push([ L, P1, P2 ]);
    otherArr.push([ O1, O2, P2 ]);
    otherArr.push([ O1, P2, P1 ]);
  });
  return {
    pos: pos,
    neg: neg
  };
}

function buildZigzagHalves(geometry, yMin, yMax, numSegments, amplitude) {
  const pos = geometry.attributes.position;
  const col = geometry.attributes.color;
  const index = geometry.index ? geometry.index.array : null;
  const triCount = index ? index.length / 3 : pos.count / 3;
  const getIdx = (t, k) => index ? index[t * 3 + k] : t * 3 + k;
  function vAt(i) {
    return {
      p: [ pos.getX(i), pos.getY(i), pos.getZ(i) ],
      c: col ? [ col.getX(i), col.getY(i), col.getZ(i) ] : [ 1, 1, 1 ]
    };
  }
  let allTris = [];
  for (let t = 0; t < triCount; t++) allTris.push([ vAt(getIdx(t, 0)), vAt(getIdx(t, 1)), vAt(getIdx(t, 2)) ]);
  const yBreaks = [];
  for (let i = 0; i <= numSegments; i++) yBreaks.push(yMin + (yMax - yMin) * i / numSegments);
  let seed = 42;
  function rand() {
    seed = (seed * 9301 + 49297) % 233280;
    return seed / 233280;
  }
  const tailFade = Math.max(3, Math.round(numSegments * .12));
  const xBreaks = yBreaks.map((_, i) => {
    const taper = i >= numSegments - tailFade ? Math.max(0, (numSegments - i) / tailFade) : 1;
    return (rand() * 2 - 1) * amplitude * taper;
  });
  let remaining = allTris;
  const bands = [];
  for (let i = 0; i < numSegments; i++) if (i === numSegments - 1) bands.push(remaining); else {
    const {neg: belowBand, pos: aboveRest} = clipTrianglesByPlane(remaining, 0, 1, yBreaks[i + 1]);
    bands.push(belowBand);
    remaining = aboveRest;
  }
  const leftTris = [], rightTris = [];
  bands.forEach((band, i) => {
    const x0 = xBreaks[i], y0 = yBreaks[i];
    const x1 = xBreaks[i + 1], y1 = yBreaks[i + 1];
    const dx = x1 - x0, dy = y1 - y0;
    const nx = dy, nyv = -dx;
    const d = nx * x0 + nyv * y0;
    const {pos: sideA, neg: sideB} = clipTrianglesByPlane(band, nx, nyv, d);
    function avgX(list) {
      let sum = 0, cnt = 0;
      list.forEach(tri => tri.forEach(v => {
        sum += v.p[0];
        cnt++;
      }));
      return cnt ? sum / cnt : 0;
    }
    if (avgX(sideA) >= avgX(sideB)) {
      rightTris.push(...sideA);
      leftTris.push(...sideB);
    } else {
      rightTris.push(...sideB);
      leftTris.push(...sideA);
    }
  });
  function toGeometry(tris) {
    const geo = new THREE.BufferGeometry;
    const count = tris.length * 3;
    const positions = new Float32Array(count * 3);
    const colors = new Float32Array(count * 3);
    let k = 0;
    tris.forEach(tri => tri.forEach(v => {
      positions[k * 3] = v.p[0];
      positions[k * 3 + 1] = v.p[1];
      positions[k * 3 + 2] = v.p[2];
      colors[k * 3] = v.c[0];
      colors[k * 3 + 1] = v.c[1];
      colors[k * 3 + 2] = v.c[2];
      k++;
    }));
    geo.setAttribute("position", new THREE.BufferAttribute(positions, 3));
    geo.setAttribute("color", new THREE.BufferAttribute(colors, 3));
    return geo;
  }
  return {
    leftGeo: toGeometry(leftTris),
    rightGeo: toGeometry(rightTris)
  };
}

function createFortunePaperTexture(text) {
  const w = 1024, h = 260;
  const canvas = document.createElement("canvas");
  canvas.width = w;
  canvas.height = h;
  const ctx = canvas.getContext("2d");
  ctx.fillStyle = "#FBF4E2";
  ctx.fillRect(0, 0, w, h);
  const grad = ctx.createRadialGradient(w / 2, h / 2, h * .2, w / 2, h / 2, w * .6);
  grad.addColorStop(0, "rgba(0,0,0,0)");
  grad.addColorStop(1, "rgba(120,100,60,0.12)");
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, w, h);
  ctx.strokeStyle = "rgba(22,23,72,0.35)";
  ctx.lineWidth = 3;
  ctx.strokeRect(10, 10, w - 20, h - 20);
  const inset = 34;
  ctx.strokeStyle = "#161748";
  ctx.lineWidth = 4;
  ctx.strokeRect(inset, inset, w - inset * 2, h - inset * 2);
  ctx.fillStyle = "#161748";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  let fontSize = 92;
  const maxTextWidth = w - 120;
  do {
    ctx.font = "bold " + fontSize + "px Arial";
    fontSize -= 2;
  } while (ctx.measureText(text).width > maxTextWidth && fontSize > 20);
  ctx.fillText(text, w / 2, h / 2);
  const tex = new THREE.CanvasTexture(canvas);
  tex.colorSpace = THREE.SRGBColorSpace;
  tex.anisotropy = 8;
  return {
    tex: tex,
    aspect: w / h
  };
}

function createLogoTexture() {
  return new Promise(resolve => {
    const size = 512;
    const canvas = document.createElement("canvas");
    canvas.width = size;
    canvas.height = size;
    const ctx = canvas.getContext("2d");
    const ringRadius = size / 2 - 70;
    ctx.beginPath();
    ctx.arc(size / 2, size / 2, ringRadius, 0, Math.PI * 2);
    ctx.fillStyle = "#CFCFCF";
    ctx.fill();
    ctx.lineWidth = 12;
    ctx.strokeStyle = "#161748";
    ctx.stroke();
    const blob = new Blob([ LOGO_SVG ], {
      type: "image/svg+xml"
    });
    const url = URL.createObjectURL(blob);
    const img = new Image;
    img.onload = () => {
      const scale = .58;
      const w = size * scale;
      const h = w * (img.height / img.width);
      ctx.drawImage(img, (size - w) / 2, (size - h) / 2, w, h);
      URL.revokeObjectURL(url);
      const tex = new THREE.CanvasTexture(canvas);
      tex.colorSpace = THREE.SRGBColorSpace;
      tex.anisotropy = 8;
      resolve(tex);
    };
    img.src = url;
  });
}

const controlsState = {
  target: new THREE.Vector3(0, 1.4, 0),
  autoRotate: true,
  rotateSpeed: .006,
  dragSensitivity: .006,
  pitchLimit: .5
};

const leftHalf = new THREE.Group;

const rightHalf = new THREE.Group;

pivot.add(leftHalf, rightHalf);

const SPLIT_DISTANCE = .9;

const openState = {
  isOpen: false,
  progress: 0,
  animating: false
};

function easeInOutCubic(t) {
  return t < .5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
}

function toggleBoxOpen() {
  openState.isOpen = !openState.isOpen;
  openState.animating = true;
  controlsState.autoRotate = false;
}

let isDragging = false;

let lastX = 0;

let lastY = 0;

let pointerDownX = 0;

let pointerDownY = 0;

let pointerDownTime = 0;

function onPointerDown(e) {
  isDragging = true;
  stage.classList.add("dragging");
  lastX = e.clientX;
  lastY = e.clientY;
  pointerDownX = e.clientX;
  pointerDownY = e.clientY;
  pointerDownTime = performance.now();
  stage.setPointerCapture && e.pointerId != null && stage.setPointerCapture(e.pointerId);
}

function onPointerMove(e) {
  if (!isDragging) return;
  const dx = e.clientX - lastX;
  const dy = e.clientY - lastY;
  lastX = e.clientX;
  lastY = e.clientY;
  controlsState.autoRotate = false;
  pivot.rotation.y += dx * controlsState.dragSensitivity;
  pivot.rotation.x += dy * controlsState.dragSensitivity;
  pivot.rotation.x = Math.max(-controlsState.pitchLimit, Math.min(controlsState.pitchLimit, pivot.rotation.x));
}

function onPointerUp(e) {
  isDragging = false;
  stage.classList.remove("dragging");
  if (!e) return;
  const dx = e.clientX - pointerDownX;
  const dy = e.clientY - pointerDownY;
  const moved = Math.hypot(dx, dy);
  const elapsed = performance.now() - pointerDownTime;
  if (moved < 6 && elapsed < 500) toggleBoxOpen();
}

stage.addEventListener("pointerdown", onPointerDown);

window.addEventListener("pointermove", onPointerMove);

window.addEventListener("pointerup", onPointerUp);

window.addEventListener("pointercancel", () => onPointerUp(null));

window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  updateCameraDistance();
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

const OPEN_ANIM_SPEED = 1.6;

let lastFrameTime = performance.now();

function animate() {
  requestAnimationFrame(animate);
  const now = performance.now();
  const dt = Math.min(.05, (now - lastFrameTime) / 1e3);
  lastFrameTime = now;
  if (controlsState.autoRotate) pivot.rotation.y -= controlsState.rotateSpeed;
  if (openState.animating) {
    const target = openState.isOpen ? 1 : 0;
    const dir = target > openState.progress ? 1 : -1;
    openState.progress += dir * OPEN_ANIM_SPEED * dt;
    openState.progress = Math.max(0, Math.min(1, openState.progress));
    if (openState.progress === target) {
      openState.animating = false;
      controlsState.autoRotate = true;
    }
  }
  const openEase = easeInOutCubic(openState.progress);
  leftHalf.position.x = -SPLIT_DISTANCE * openEase;
  rightHalf.position.x = SPLIT_DISTANCE * openEase;
  leftHalf.rotation.y = -.25 * openEase;
  rightHalf.rotation.y = .25 * openEase;
  renderer.render(scene, camera);
}

animate();
