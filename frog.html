function computeBodyBounds(model) {

  let yMin = 1 / 0, yMax = -1 / 0;

  const points = [];

  model.traverse(child => {

    if (!child.isMesh) return;

    const pos = child.geometry.attributes.position;

    for (let i = 0; i < pos.count; i++) {

      const x = pos.getX(i), y = pos.getY(i), z = pos.getZ(i);

      points.push(x, y, z);

      if (y < yMin) yMin = y;

      if (y > yMax) yMax = y;

    }

  });

  const bins = 60;

  const stats = Array.from({

    length: bins

  }, () => ({

    count: 0,

    xMin: 1 / 0,

    xMax: -1 / 0,

    zMin: 1 / 0,

    zMax: -1 / 0

  }));

  for (let i = 0; i < points.length; i += 3) {

    const x = points[i], y = points[i + 1], z = points[i + 2];

    let bi = Math.floor((y - yMin) / (yMax - yMin) * bins);

    bi = Math.max(0, Math.min(bins - 1, bi));

    const s = stats[bi];

    s.count++;

    if (x < s.xMin) s.xMin = x;

    if (x > s.xMax) s.xMax = x;

    if (z < s.zMin) s.zMin = z;

    if (z > s.zMax) s.zMax = z;

  }

  const lowerCount = Math.floor(bins * .7);

  let maxDepth = 0;

  for (let i = 0; i < lowerCount; i++) {

    const s = stats[i];

    if (s.count === 0) continue;

    maxDepth = Math.max(maxDepth, s.zMax - s.zMin);

  }

  let bodyTopBin = bins - 1;

  for (let i = 0; i < bins; i++) {

    const s = stats[i];

    if (s.count === 0) continue;

    if (s.zMax - s.zMin < maxDepth * .82) {

      bodyTopBin = i;

      break;

    }

  }

  const bodyTopY = yMin + bodyTopBin / bins * (yMax - yMin);

  let sumHalfW = 0, sumHalfD = 0, n = 0;

  for (let i = 0; i < bodyTopBin; i++) {

    const s = stats[i];

    if (s.count === 0) continue;

    sumHalfW += (s.xMax - s.xMin) / 2;

    sumHalfD += (s.zMax - s.zMin) / 2;

    n++;

  }

  return {

    yMin: yMin,

    yMax: yMax,

    bodyTopY: bodyTopY,

    halfWidth: n ? sumHalfW / n : .5,

    halfDepth: n ? sumHalfD / n : .5

function paintGradient(model, body) {

      colors[i * 3 + 2] = tmp.b;

    }

    geo.setAttribute("color", new THREE.BufferAttribute(colors, 3));

    meshes.push(child);

  });

}

function clipTrianglesByPlane(tris, nx, ny, d) {

  const pos = [], neg = [];

  function lerpVert(a, b, t) {

    const {neg: belowBand, pos: aboveRest} = clipTrianglesByPlane(remaining, 0, 1, yBreaks[i + 1]);

    bands.push(belowBand);

    remaining = aboveRest;

  }

  const leftTris = [], rightTris = [];

  bands.forEach((band, i) => {

    const x0 = xBreaks[i], y0 = yBreaks[i];

    const x1 = xBreaks[i + 1], y1 = yBreaks[i + 1];

    const dx = x1 - x0, dy = y1 - y0;

    const nx = dy, nyv = -dx;

    const d = nx * x0 + nyv * y0;

    const {pos: sideA, neg: sideB} = clipTrianglesByPlane(band, nx, nyv, d);

    function avgX(list) {

      let sum = 0, cnt = 0;

      list.forEach(tri => tri.forEach(v => {

        sum += v.p[0];

        cnt++;

      }));

      return cnt ? sum / cnt : 0;

    }

    if (avgX(sideA) >= avgX(sideB)) {

      rightTris.push(...sideA);

      leftTris.push(...sideB);

    } else {

      rightTris.push(...sideB);

      leftTris.push(...sideA);

    }

  });

  function toGeometry(tris) {

    const geo = new THREE.BufferGeometry;

    const count = tris.length * 3;

    const positions = new Float32Array(count * 3);

    const colors = new Float32Array(count * 3);

    let k = 0;

    tris.forEach(tri => tri.forEach(v => {

      positions[k * 3] = v.p[0];

      positions[k * 3 + 1] = v.p[1];

      positions[k * 3 + 2] = v.p[2];

      colors[k * 3] = v.c[0];

      colors[k * 3 + 1] = v.c[1];

      colors[k * 3 + 2] = v.c[2];

      k++;

    }));

    geo.setAttribute("position", new THREE.BufferAttribute(positions, 3));

    geo.setAttribute("color", new THREE.BufferAttribute(colors, 3));

    return geo;

  }

  return {

    leftGeo: toGeometry(leftTris),

    rightGeo: toGeometry(rightTris)

  };

}

function createFortunePaperTexture(text) {

  const w = 1024, h = 260;

  const canvas = document.createElement("canvas");

  canvas.width = w;

  canvas.height = h;

  const ctx = canvas.getContext("2d");

  ctx.fillStyle = "#F4F3EF";

  ctx.fillRect(0, 0, w, h);

  const grad = ctx.createRadialGradient(w / 2, h / 2, h * .2, w / 2, h / 2, w * .6);

  grad.addColorStop(0, "rgba(0,0,0,0)");

  grad.addColorStop(1, "rgba(120,100,60,0.12)");

  ctx.fillStyle = grad;

  ctx.fillRect(0, 0, w, h);

  ctx.strokeStyle = "rgba(22,23,72,0.35)";

  ctx.lineWidth = 3;

  ctx.strokeRect(10, 10, w - 20, h - 20);

  const inset = 34;

  ctx.strokeStyle = "#161748";

  ctx.lineWidth = 4;

  ctx.strokeRect(inset, inset, w - inset * 2, h - inset * 2);

  ctx.fillStyle = "#161748";

  ctx.textAlign = "center";

  ctx.textBaseline = "middle";

  let fontSize = 92;

  const maxTextWidth = w - 120;

  do {

    ctx.font = "bold " + fontSize + "px Arial";

    fontSize -= 2;

  } while (ctx.measureText(text).width > maxTextWidth && fontSize > 20);

  ctx.fillText(text, w / 2, h / 2);

  const tex = new THREE.CanvasTexture(canvas);

  tex.colorSpace = THREE.SRGBColorSpace;

  tex.anisotropy = 8;

  return {

    tex: tex,

    aspect: w / h

  };

}

function createLogoTexture() {

  return new Promise(resolve => {

    const size = 512;

    const canvas = document.createElement("canvas");

    canvas.width = size;

    canvas.height = size;

    const ctx = canvas.getContext("2d");

    const ringRadius = size / 2 - 70;

    ctx.beginPath();

    ctx.arc(size / 2, size / 2, ringRadius, 0, Math.PI * 2);

    ctx.fillStyle = "#F4F3EF";

    ctx.fill();

    ctx.lineWidth = 12;

    ctx.strokeStyle = "#161748";

    ctx.stroke();

    const blob = new Blob([ LOGO_SVG ], {

      type: "image/svg+xml"

    });

    const url = URL.createObjectURL(blob);

    const img = new Image;

    img.onload = () => {

      const scale = .58;

      const w = size * scale;

      const h = w * (img.height / img.width);

      ctx.drawImage(img, (size - w) / 2, (size - h) / 2, w, h);

      URL.revokeObjectURL(url);

      const tex = new THREE.CanvasTexture(canvas);

      tex.colorSpace = THREE.SRGBColorSpace;

      tex.anisotropy = 8;

      resolve(tex);

    };

    img.src = url;

  });

}

const loader = new GLTFLoader;

createLogoTexture().then(logoTexture => {

  loader.load(BOX_URL, gltf => {

    const model = gltf.scene;

    const box = (new THREE.Box3).setFromObject(model);

    const size = new THREE.Vector3;

    const center = new THREE.Vector3;

    box.getSize(size);

    box.getCenter(center);

    const body = computeBodyBounds(model);

    const meshes = paintGradient(model, body);

    let leftGeo = null;

    let rightGeo = null;

    meshes.forEach(mesh => {

      const {leftGeo: lg, rightGeo: rg} = buildZigzagHalves(mesh.geometry, box.min.y, box.max.y, 26, .16);

      leftGeo = lg;

      rightGeo = rg;

    });

    const leftMesh = buildStyledMesh(leftGeo, false);

    leftHalf.add(leftMesh);

    const rightMesh = buildStyledMesh(rightGeo, false);

    rightHalf.add(rightMesh);

    const bodyHeight = body.bodyTopY - body.yMin;

    const faceHalf = Math.min(body.halfWidth, bodyHeight / 2);

    const circleDiameter = faceHalf * 2 * .5;

    const bodyCenterY = (body.yMin + body.bodyTopY) / 2;

    function buildLogoMesh() {

      const logoGeo = new THREE.CircleGeometry(circleDiameter / 2, 64);

      const logoMat = new THREE.MeshBasicMaterial({

        map: logoTexture,

        transparent: true,

        toneMapped: false

      });

      return new THREE.Mesh(logoGeo, logoMat);

    }

    const leftLogoMesh = buildLogoMesh();

    setLogoOrientation(leftLogoMesh, -Math.PI / 2, LOGO_TILT);

    leftLogoMesh.position.set(-LOGO_X, bodyCenterY, center.z);

    leftHalf.add(leftLogoMesh);

    const rightLogoMesh = buildLogoMesh();

    setLogoOrientation(rightLogoMesh, Math.PI / 2, -LOGO_TILT);

    rightLogoMesh.position.set(LOGO_X, bodyCenterY, center.z);

    rightHalf.add(rightLogoMesh);
    (function() {
      const FROG_URL = "https://raw.githubusercontent.com/sunagatullinadi-max/toy/main/frog.glb";

      const loader = new GLTFLoader();
      loader.load(FROG_URL, function(gltf) {
        const frogModel = gltf.scene;

        const box3 = new THREE.Box3().setFromObject(frogModel);
        const size = new THREE.Vector3();
        box3.getSize(size);
        const scale = 1.2 / Math.max(size.x, size.y, size.z);
        frogModel.scale.setScalar(scale);

        const paperCenterY = (box.min.y + body.bodyTopY) / 2;
        box3.setFromObject(frogModel);
        const center3 = new THREE.Vector3();
        box3.getCenter(center3);
        frogModel.position.set(
          center.x - center3.x,
          paperCenterY - 0.1 - center3.y,
          center.z - center3.z
        );

        pivot.add(frogModel);

        const frogLight1 = new THREE.PointLight(0x4488ff, 5.0, 6);
        frogLight1.position.set(0.3, 1.0, 0.6);
        pivot.add(frogLight1);
        const frogLight2 = new THREE.PointLight(0x0033ff, 3.0, 5);
        frogLight2.position.set(-0.4, 0.2, -0.4);
        pivot.add(frogLight2);
        const frogLight3 = new THREE.PointLight(0x66aaff, 2.0, 4);
        frogLight3.position.set(0.0, -0.5, 0.5);
        pivot.add(frogLight3);
      }, undefined, function(err) {
        console.error('Frog load error:', err);
      });
    })();

    boxLocalMin = box.min.clone();

    boxLocalMax = box.max.clone();

    sceneCenter.copy(center);

    sceneMaxDim = Math.max(size.x, size.y, size.z);

    sceneSizeY = size.y;

    updateCameraDistance();

    controlsState.target.copy(center);

    loaderEl.classList.add("hidden");

  });

});

const controlsState = {

  target: new THREE.Vector3(0, 1.4, 0),

  autoRotate: true,

  rotateSpeed: .006,

  dragSensitivity: .006,

  pitchLimit: .5

};

const leftHalf = new THREE.Group;

const rightHalf = new THREE.Group;

pivot.add(leftHalf, rightHalf);

const SPLIT_DISTANCE = .9;

const openState = {

  isOpen: false,

  progress: 0,

  animating: false

};

function easeInOutCubic(t) {

  return t < .5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;

}

function toggleBoxOpen() {

  openState.isOpen = !openState.isOpen;

  openState.animating = true;

  controlsState.autoRotate = false;

}

let isDragging = false;

let pointerDownOnBox = false;

let lastX = 0;

let lastY = 0;

let pointerDownX = 0;

let pointerDownY = 0;

let pointerDownTime = 0;

function onPointerDown(e) {

  pointerDownOnBox = isPointerOnBox(e.clientX, e.clientY);

  if (!pointerDownOnBox) return;

  isDragging = true;

  stage.classList.add("dragging");

  lastX = e.clientX;

  lastY = e.clientY;

  pointerDownX = e.clientX;

  pointerDownY = e.clientY;

  pointerDownTime = performance.now();

  stage.setPointerCapture && e.pointerId != null && stage.setPointerCapture(e.pointerId);

  e.preventDefault();

}

function onPointerMove(e) {

  if (!isDragging) return;

  const dx = e.clientX - lastX;

  const dy = e.clientY - lastY;

  lastX = e.clientX;

  lastY = e.clientY;

  controlsState.autoRotate = false;

  pivot.rotation.y += dx * controlsState.dragSensitivity;

  pivot.rotation.x += dy * controlsState.dragSensitivity;

  pivot.rotation.x = Math.max(-controlsState.pitchLimit, Math.min(controlsState.pitchLimit, pivot.rotation.x));

}

function onPointerUp(e) {

  isDragging = false;

  stage.classList.remove("dragging");

  if (!e || !pointerDownOnBox) return;

  const dx = e.clientX - pointerDownX;

  const dy = e.clientY - pointerDownY;

  const moved = Math.hypot(dx, dy);

  const elapsed = performance.now() - pointerDownTime;

  if (moved < 6 && elapsed < 500) toggleBoxOpen();

}

stage.addEventListener("pointerdown", onPointerDown);

window.addEventListener("pointermove", onPointerMove);

window.addEventListener("pointerup", onPointerUp);

window.addEventListener("pointercancel", () => onPointerUp(null));

window.addEventListener("resize", () => {

  camera.aspect = window.innerWidth / window.innerHeight;

  updateCameraDistance();

  camera.updateProjectionMatrix();

  renderer.setSize(window.innerWidth, window.innerHeight);

});

const OPEN_ANIM_SPEED = 1.6;

let lastFrameTime = performance.now();

function animate() {

  requestAnimationFrame(animate);

  const now = performance.now();

  const dt = Math.min(.05, (now - lastFrameTime) / 1e3);

  lastFrameTime = now;

  if (controlsState.autoRotate) pivot.rotation.y -= controlsState.rotateSpeed;

  if (openState.animating) {

    const target = openState.isOpen ? 1 : 0;

    const dir = target > openState.progress ? 1 : -1;

    openState.progress += dir * OPEN_ANIM_SPEED * dt;

    openState.progress = Math.max(0, Math.min(1, openState.progress));

    if (openState.progress === target) {

      openState.animating = false;

      controlsState.autoRotate = true;

    }

  }

  const openEase = easeInOutCubic(openState.progress);

  leftHalf.position.x = -SPLIT_DISTANCE * openEase;

  rightHalf.position.x = SPLIT_DISTANCE * openEase;

  leftHalf.rotation.y = -.25 * openEase;

  rightHalf.rotation.y = .25 * openEase;

  renderer.render(scene, camera);

}

animate();

    
</script>
